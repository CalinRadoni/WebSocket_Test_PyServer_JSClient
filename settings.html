<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>ESP32 Demo site - Settings</title>
  <meta name="description" content="ESP32 Demo site Settings">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- <link rel="stylesheet" href="cream-mn.min.css"> -->
  <link rel="stylesheet" href="modern-normalize.css">
  <link rel="stylesheet" href="cream.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <script type="module" src="./settings.js"></script>
</head>

<body>
  <header>
    <h1 class="c-main">ESP32 Demo site Settings</h1>
    <h2>The form is generated from a JSON string. The values are from the server.</h2>
    <nav id="topmenu">
      <!-- <a href="https://github.com/CalinRadoni">GitHub</a> -->
    </nav>
  </header>
  <main>
    <svg style="display: none">
      <defs>
        <symbol id="svg-arrow-right" viewbox="0 0 100 100"
          style="fill:var(--c-svgf,#888);stroke:var(--c-svgs,#000)">
          <path class="svg-legend" d="M10 10l80 40l-80 40z" />
        </symbol>
        <symbol id="svg-eye" viewbox = "0 0 160 160"
          style="fill:none; stroke:var(--c-svgs,#888)">
          <path style="fill:var(--c-svgf,#000);" d="m 12,80 c 0,0 41,-44 68,-44 27,0 68,44 68,44 0,0 -41,44 -68,44 C 53,124 12,80 12,80 Z" />
          <circle style="fill:var(--c-svgfm,#000)" cx="80" cy="80" r="20" />
          <path style="stroke:var(--c-svgso,#888)" d="M 24,24 136,136" />
        </symbol>
      </defs>
    </svg>
    <form id="settings"></form>
  </main>
  <footer>
    <cream-row>
      <cream-card>
        <p id="currentTime"></p>
      </cream-card>
      <cream-card>
        <p id="log"></p>
      </cream-card>
    </cream-row>
  </footer>
</body>

</html>
