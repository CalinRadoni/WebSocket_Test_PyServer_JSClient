<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>ESP32 Demo site - Settings</title>
  <meta name="description" content="ESP32 Demo site Settings">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="cream-all-mn.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <script type="module" src="./settings.js"></script>
</head>

<body>
  <header>
    <h1 class="c-main">ESP32 Demo site Settings</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="settings.html">Settings</a>
      <a href="about.html">About</a>
      <a href="https://github.com/CalinRadoni">GitHub</a>
    </nav>
  </header>
  <main>
    <form id="settings">
      <fieldset>
        <legend></legend>
        <div>
          <label for="deviceName">Device name</label>
          <input type="text" id="deviceName" value="">
        </div>
        <div>
          <label for="mDNS">mDNS name</label>
          <input type="text" id="mDNS" value="">
        </div>
      </fieldset>
      <fieldset>
        <legend>WiFi configuration</legend>
        <div>
          <label for="w0SSID">SSID</label>
          <input type="text" id="w0SSID" value="">
        </div>
        <div>
          <label for="w0Pass">Password</label>
          <input type="password" id="w0Pass" value="">
        </div>
        <div>
          <input type="checkbox" id="w0UseDHCP"><label for="w0UseDHCP">Use DHCP</label><br>
          <p>Most of the time the addresses are set using DHCP</p>
        </div>
        <div>
          <label for="w0IP">IPv4</label>
          <input type="text" id="w0IP" value="" pattern="^((25[0-5]|(2[0-4]|1\d|[1-9]|)\d)\.?\b){4}$"
            placeholder="xxx.xxx.xxx.xxx">
        </div>
        <div>
          <label for="w0Mask">Mask</label>
          <input type="text" id="w0Mask" value="" pattern="^((25[0-5]|(2[0-4]|1\d|[1-9]|)\d)\.?\b){4}$"
            placeholder="xxx.xxx.xxx.xxx">
        </div>
        <div>
          <label for="w0GW">Gateway</label>
          <input type="text" id="w0GW" value="" pattern="^((25[0-5]|(2[0-4]|1\d|[1-9]|)\d)\.?\b){4}$"
            placeholder="xxx.xxx.xxx.xxx">
        </div>
        <div>
          <label for="w0DNS">DNS</label>
          <input type="text" id="w0DNS" value="" pattern="^((25[0-5]|(2[0-4]|1\d|[1-9]|)\d)\.?\b){4}$"
            placeholder="xxx.xxx.xxx.xxx">
        </div>
      </fieldset>
      <fieldset>
        <legend>Time</legend>
        <div>
          <label for="tz">Timezone</label>
          <select id="tz"></select>
        </div>
        <input type="checkbox" id="chkNTP"><label for="chkNTP">Use NTP</label><br>
        <div>
          <label for="srvNTP">NTP Server</label>
          <input type="text" id="srvNTP" placeholder="pool.ntp.org" value="">
        </div>
      </fieldset>
      <fieldset>
        <legend>Telegram</legend>
        <div>
          <label for="chatID">Chat ID</label>
          <input type="text" id="chatID" value="">
        </div>
        <div>
          <label for="botName">Bot name</label>
          <input type="text" id="botName" value="">
        </div>
        <div>
          <label for="botToken">Bot token</label>
          <input type="text" id="botToken" value="">
        </div>
      </fieldset>
      <fieldset>
        <button type="button" id="btnSave">Save</button>
        <button type="button" id="btnReset">Reset</button>
      </fieldset>
      <fieldset>
        <legend>Test fields</legend>
        <div>
          <label for="email0">e-mail</label>
          <input type="email" id="email0" value="">
        </div>
        <div>
          <label for="dateS">date</label><input type="date" id="dateS" value="">
        </div>
        <div>
          <label for="timeS">time</label><input type="time" id="timeS" value="">
        </div>
        <input type="checkbox" id="chk0"><label for="chk0">A checkbox</label><br>
        <input type="checkbox" id="chk1"><label for="chk1">Another checkbox</label><br>
        <label for="">Choose an option:</label>
        <input type="radio" name="radioBB" id="ro0"><label for="ro0">First option</label><br>
        <input type="radio" name="radioBB" id="ro1"><label for="ro1">Second option</label><br>
        <input type="radio" name="radioBB" id="ro2"><label for="ro2">Third option</label><br>
      </fieldset>
    </form>
  </main>
  <footer>
    <cream-row>
      <cream-card>
        <p id="currentTime"></p>
      </cream-card>
      <cream-card>
        <p id="log"></p>
      </cream-card>
    </cream-row>
  </footer>
</body>

</html>
